<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Phone | Red Invictus</title>
    
    <!-- 1. Librerías de Diseño e Iconos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <!-- 2. SDK DE TWILIO (MOTOR DE LLAMADAS REALES) -->
    <script src="https://sdk.twilio.com/js/voice/releases/2.10.1/twilio.js"></script>

    <!-- 3. Librerías de React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Configuración Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Rajdhani', 'sans-serif'],
                        display: ['Orbitron', 'sans-serif'],
                        mono: ['"Share Tech Mono"', 'monospace'],
                    },
                    colors: {
                        quantum: {
                            bg: '#020510',
                            panel: '#0a1024',
                            cyan: '#00f0ff',
                            gold: '#ffcc00',
                            red: '#ff2a00'
                        }
                    },
                    animation: {
                        'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
                    },
                    keyframes: {
                        pulseGlow: {
                            '0%, 100%': { boxShadow: '0 0 15px rgba(0, 240, 255, 0.2)' },
                            '50%': { boxShadow: '0 0 30px rgba(0, 240, 255, 0.6)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #020510; 
            color: #ffffff; 
            overflow: hidden; 
            margin: 0; 
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 240, 255, 0.1) 0%, transparent 50%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2300f0ff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .glass-panel {
            background: rgba(10, 16, 36, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 240, 255, 0.05);
        }

        .dial-btn {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.1);
            transition: all 0.2s;
        }
        .dial-btn:active {
            background: rgba(0, 240, 255, 0.3);
            transform: scale(0.95);
        }

        /* Ondas de Voz */
        .voice-waves { display: flex; align-items: center; justify-content: center; gap: 4px; height: 60px; }
        .v-bar { width: 6px; background: #00f0ff; border-radius: 3px; height: 6px; box-shadow: 0 0 10px #00f0ff; transition: height 0.05s ease; }
    </style>
</head>
<body>

    <!-- Contenedor Principal (Con mensaje de seguridad en caso de carga lenta) -->
    <div id="root" class="w-full h-full flex items-center justify-center p-4">
        <div class="text-center text-cyan-500 font-mono animate-pulse">
            <i class="ph ph-circle-notch animate-spin text-4xl mb-4"></i>
            <p>CONECTANDO A LA RED INVICTUS...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const QuantumPhone = () => {
            // Estados: BOOT, CONNECTED, DIALING, CALLING, ACTIVE
            const [status, setStatus] = useState('BOOT');
            const [number, setNumber] = useState('');
            const [logs, setLogs] = useState([]);
            const [callDuration, setCallDuration] = useState(0);
            const [audioLevel, setAudioLevel] = useState(0);
            
            // Estado Twilio
            const [twilioDevice, setTwilioDevice] = useState(null);
            const [activeConnection, setActiveConnection] = useState(null);

            const timerRef = useRef(null);
            const audioContextRef = useRef(null);
            const analyserRef = useRef(null);
            const dataArrayRef = useRef(null);
            const sourceRef = useRef(null);
            const animationFrameRef = useRef(null);

            const addLog = (msg) => setLogs(prev => [...prev, msg].slice(-3));

            // Secuencia de inicio y Preparación de Twilio
            useEffect(() => {
                if (status === 'BOOT') {
                    addLog("INICIANDO PROTOCOLO QUANTUM...");
                    setTimeout(() => {
                        addLog("BUSCANDO CONSTELACIÓN STARLINK...");
                        
                        // AQUÍ ES DONDE SE CONECTARÁ AL BACKEND DE HEROKU PARA OBTENER EL TOKEN DE TWILIO
                        // Ejemplo futuro: fetch('/api/twilio-token').then(res => setupTwilio(res.token));
                        
                        setTimeout(() => {
                            addLog("ENLACE SATELITAL ESTABLECIDO.");
                            addLog("MODO DEMO ACTIVO (Falta Token Twilio).");
                            setStatus('CONNECTED');
                        }, 1500);
                    }, 1500);
                }
            }, [status]);

            // Manejo del contador de llamadas
            useEffect(() => {
                if (status === 'ACTIVE') {
                    timerRef.current = setInterval(() => {
                        setCallDuration(prev => prev + 1);
                    }, 1000);
                } else {
                    clearInterval(timerRef.current);
                    setCallDuration(0);
                }
                return () => clearInterval(timerRef.current);
            }, [status]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            const handleDial = (digit) => {
                if (number.length < 15) setNumber(prev => prev + digit);
                // Sonido de teclado simulado
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800 + (parseInt(digit) || 0) * 50, ctx.currentTime);
                    osc.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.1);
                } catch(e) {}
            };

            const deleteDigit = () => setNumber(prev => prev.slice(0, -1));

            // INICIAR LLAMADA (Vía Twilio o Demo)
            const startCall = async () => {
                if (!number) return;
                setStatus('CALLING');
                addLog(`MARCANDO A: ${number}`);

                if (twilioDevice) {
                    // LLAMADA REAL CON TWILIO
                    try {
                        addLog("ENRUTANDO VÍA TWILIO GATEWAY...");
                        const params = { To: number };
                        const call = await twilioDevice.connect({ params });
                        setActiveConnection(call);
                        
                        call.on('accept', () => {
                            setStatus('ACTIVE');
                            addLog("CONEXIÓN REAL ESTABLECIDA.");
                            setupAudioVisualizer();
                        });
                        
                        call.on('disconnect', () => {
                            endCall();
                        });

                        call.on('error', (err) => {
                            addLog(`ERROR TWILIO: ${err.message}`);
                            setStatus('CONNECTED');
                        });
                    } catch (err) {
                        addLog("FALLO EN ENLACE TWILIO.");
                        setStatus('CONNECTED');
                    }
                } else {
                    // MODO DEMO (Simula la llamada y captura tu micrófono)
                    addLog("ADVERTENCIA: RUTEO REAL DESACTIVADO.");
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        addLog("MICRÓFONO CONECTADO. CANAL SEGURO.");
                        setupAudioVisualizer(stream);

                        setTimeout(() => {
                            setStatus('ACTIVE');
                            addLog("SIMULACIÓN DE LLAMADA CONECTADA.");
                        }, 2500);
                    } catch (err) {
                        addLog("ERROR: PERMISO DE MICRÓFONO DENEGADO.");
                        setStatus('CONNECTED');
                    }
                }
            };

            const setupAudioVisualizer = (stream) => {
                try {
                    audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    analyserRef.current = audioContextRef.current.createAnalyser();
                    
                    // Si es Twilio, el stream viene del dispositivo, si es demo, viene de getUserMedia
                    if (stream) {
                        sourceRef.current = audioContextRef.current.createMediaStreamSource(stream);
                        sourceRef.current.connect(analyserRef.current);
                    }
                    
                    analyserRef.current.fftSize = 256;
                    updateAudioVisualizer();
                } catch(e) {
                    console.warn("Visualizador de audio no soportado.");
                }
            };

            const updateAudioVisualizer = () => {
                if (!analyserRef.current) return;
                
                if (!dataArrayRef.current) {
                    dataArrayRef.current = new Uint8Array(analyserRef.current.frequencyBinCount);
                }
                
                analyserRef.current.getByteFrequencyData(dataArrayRef.current);
                let sum = 0;
                for(let i = 0; i < dataArrayRef.current.length; i++) {
                    sum += dataArrayRef.current[i];
                }
                const average = sum / dataArrayRef.current.length;
                
                setAudioLevel(average);
                animationFrameRef.current = requestAnimationFrame(updateAudioVisualizer);
            };

            const endCall = () => {
                if (activeConnection) {
                    activeConnection.disconnect();
                    setActiveConnection(null);
                }
                
                setStatus('CONNECTED');
                setNumber('');
                addLog("LLAMADA FINALIZADA.");
                
                if (sourceRef.current && sourceRef.current.mediaStream) {
                    sourceRef.current.mediaStream.getTracks().forEach(track => track.stop());
                }
                if (audioContextRef.current) {
                    audioContextRef.current.close();
                }
                if (animationFrameRef.current) {
                    cancelAnimationFrame(animationFrameRef.current);
                }
                setAudioLevel(0);
            };

            const renderVisualizer = () => {
                return Array.from({length: 7}).map((_, i) => {
                    const height = status === 'ACTIVE' ? Math.max(6, (audioLevel / 255) * 60 * (1 - Math.abs(i - 3)/4)) : 6;
                    return <div key={i} className="v-bar" style={{ height: `${height}px`, opacity: status === 'ACTIVE' ? 1 : 0.3 }}></div>;
                });
            };

            return (
                <div className="w-full max-w-sm glass-panel rounded-3xl p-6 relative overflow-hidden flex flex-col mx-auto">
                    
                    {/* Header: Estado Satelital */}
                    <div className="flex items-center justify-between border-b border-quantum-cyan/20 pb-4 mb-6">
                        <div className="flex items-center gap-3">
                            <div className={`w-10 h-10 rounded-full flex items-center justify-center ${status !== 'BOOT' ? 'bg-quantum-cyan/20 text-quantum-cyan animate-pulse' : 'bg-gray-800 text-gray-500'}`}>
                                <i className="ph-fill ph-satellite-dish text-xl"></i>
                            </div>
                            <div className="flex flex-col">
                                <span className="font-display font-bold text-sm tracking-widest text-quantum-cyan uppercase leading-tight">Uplink Invictus</span>
                                <span className="font-mono text-[9px] text-gray-400 tracking-widest">{status === 'BOOT' ? 'SEARCHING...' : (twilioDevice ? 'TWILIO ACTIVE' : 'DEMO MODE')}</span>
                            </div>
                        </div>
                        <div className="flex gap-1">
                            {[1,2,3,4].map(i => (
                                <div key={i} className={`w-1.5 h-4 rounded-full ${status !== 'BOOT' ? 'bg-quantum-cyan' : 'bg-gray-700'}`} style={{opacity: i * 0.25}}></div>
                            ))}
                        </div>
                    </div>

                    {/* Pantalla Principal */}
                    <div className="flex-1 flex flex-col items-center justify-center min-h-[140px] mb-6">
                        {status === 'BOOT' && (
                            <i className="ph ph-circle-notch text-4xl text-quantum-cyan animate-spin"></i>
                        )}

                        {(status === 'CONNECTED' || status === 'DIALING') && (
                            <div className="w-full text-center">
                                <div className="text-4xl font-mono text-white tracking-widest h-12 flex items-center justify-center font-bold">
                                    {number || <span className="text-gray-600 font-light">INGRESE NÚMERO</span>}
                                </div>
                                <div className="text-xs font-mono text-quantum-cyan mt-2 tracking-widest">LISTO PARA TRANSMITIR</div>
                            </div>
                        )}

                        {(status === 'CALLING' || status === 'ACTIVE') && (
                            <div className="w-full flex flex-col items-center">
                                <div className="text-2xl font-mono text-white tracking-widest mb-1 font-bold">{number}</div>
                                <div className={`text-xs font-bold font-display uppercase tracking-widest ${status === 'ACTIVE' ? 'text-green-400' : 'text-quantum-gold animate-pulse'}`}>
                                    {status === 'CALLING' ? 'ESTABLECIENDO ENLACE...' : 'CONEXIÓN ESTABLECIDA'}
                                </div>
                                <div className="font-mono text-2xl mt-2 text-white font-bold">{formatTime(callDuration)}</div>
                                
                                {/* Visualizador WebRTC Real */}
                                <div className="voice-waves mt-4">
                                    {renderVisualizer()}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Terminal Logs */}
                    <div className="bg-black/60 rounded-xl p-3 h-24 overflow-hidden font-mono text-[10px] text-quantum-cyan mb-6 border border-quantum-cyan/20 flex flex-col justify-end">
                        {logs.map((log, i) => <div key={i} className="mb-1 opacity-80">> {log}</div>)}
                    </div>

                    {/* Numpad */}
                    <div className={`grid grid-cols-3 gap-3 mb-6 transition-opacity duration-300 ${(status === 'CALLING' || status === 'ACTIVE' || status === 'BOOT') ? 'opacity-20 pointer-events-none' : 'opacity-100'}`}>
                        {['1','2','3','4','5','6','7','8','9','*','0','#'].map((btn) => (
                            <button 
                                key={btn} 
                                onClick={() => handleDial(btn)}
                                className="dial-btn aspect-square rounded-full flex items-center justify-center text-3xl font-display font-bold text-white relative group shadow-sm"
                            >
                                <span className="relative z-10">{btn}</span>
                            </button>
                        ))}
                    </div>

                    {/* Controles de Llamada */}
                    <div className="flex justify-center gap-8">
                        {(status === 'CONNECTED' || status === 'DIALING') ? (
                            <>
                                <button onClick={startCall} className="w-16 h-16 rounded-full bg-green-500 hover:bg-green-400 flex items-center justify-center shadow-[0_0_20px_rgba(34,197,94,0.4)] transition transform hover:scale-105">
                                    <i className="ph-fill ph-phone text-3xl text-white"></i>
                                </button>
                                <button onClick={deleteDigit} className="w-16 h-16 rounded-full dial-btn flex items-center justify-center text-gray-400 hover:text-white transition">
                                    <i className="ph-fill ph-backspace text-2xl"></i>
                                </button>
                            </>
                        ) : status !== 'BOOT' ? (
                            <button onClick={endCall} className="w-16 h-16 rounded-full bg-red-600 hover:bg-red-500 flex items-center justify-center shadow-[0_0_20px_rgba(220,38,38,0.5)] transition transform hover:scale-105 animate-pulse-glow">
                                <i className="ph-fill ph-phone-disconnect text-3xl text-white"></i>
                            </button>
                        )}
                    </div>

                </div>
            );
        };

        // Forzar el renderizado una vez que la ventana haya cargado completamente para evitar la pantalla blanca
        window.addEventListener('DOMContentLoaded', () => {
            const rootContainer = document.getElementById('root');
            rootContainer.innerHTML = ''; // Limpiar mensaje de carga
            const root = ReactDOM.createRoot(rootContainer);
            root.render(<QuantumPhone />);
        });
    </script>
</body>
</html>
